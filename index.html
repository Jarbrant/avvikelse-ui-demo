<!--
==================================================
AVVIKELSE SYSTEM DEMO – VERSION 2
Purpose:
Modern UI demo for deviation management

Features
- dashboard
- create deviation
- comments
- status
- priority
==================================================
-->

<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">

<title>Avvikelser</title>

<link rel="stylesheet" href="css/styles.css">

</head>


<body>

<!-- ============================================
HEADER
============================================ -->

<header class="header">

<h1>Avvikelser</h1>

<div>

<button class="secondary">
Exportera
</button>

<button id="createDeviationBtn" class="primary">
+ Ny avvikelse
</button>

</div>

</header>



<!-- ============================================
DASHBOARD
============================================ -->

<section class="dashboard">

<div class="stat-card">
<h3>Totalt</h3>
<p id="totalCount">0</p>
</div>

<div class="stat-card">
<h3>Nya</h3>
<p id="newCount">0</p>
</div>

<div class="stat-card">
<h3>Under utredning</h3>
<p id="progressCount">0</p>
</div>

<div class="stat-card">
<h3>Åtgärdade</h3>
<p id="resolvedCount">0</p>
</div>

</section>



<!-- ============================================
FILTER PANEL
============================================ -->

<section class="filter-panel">

<input
type="text"
placeholder="Sök avvikelse..."
id="searchInput"
/>

<select id="statusFilter">

<option value="">Alla status</option>
<option value="Ny">Ny</option>
<option value="Under utredning">Under utredning</option>
<option value="Åtgärdad">Åtgärdad</option>

</select>

</section>



<!-- ============================================
DEVIATION LIST
============================================ -->

<section id="deviationList">

</section>



<!-- ============================================
CREATE MODAL
============================================ -->

<div id="createModal" class="modal hidden">

<div class="modal-content">

<h2>Ny avvikelse</h2>

<label>Typ</label>
<select id="typeInput">
<option>Saknad måltid</option>
<option>Temperatur</option>
<option>Fel leverans</option>
<option>Övrigt</option>
</select>

<label>Prioritet</label>
<select id="priorityInput">
<option>Låg</option>
<option>Normal</option>
<option>Hög</option>
<option>Akut</option>
</select>

<label>Datum</label>
<input type="date" id="dateInput">

<label>Restaurang</label>
<input type="text" id="restaurantInput">

<label>Beskrivning</label>
<textarea id="descriptionInput"></textarea>

<label>Skapad av</label>
<input type="text" id="createdByInput">

<button id="saveDeviation" class="primary">
Skapa
</button>

<button id="closeModal" class="secondary">
Stäng
</button>

</div>

</div>



<script src="data/demo-data.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/comments.js"></script>
<script src="js/app.js"></script>

</body>
</html>
