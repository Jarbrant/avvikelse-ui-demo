<!--
==================================================
AVVIKELSE SYSTEM DEMO – VERSION 3

Roller:
- Beställare (ex: omsorg, skola)
- Restaurang (kök)

Funktioner:
- Skapa avvikelse (båda roller)
- Svara / kommentera
- Åtgärdsplan
- Dashboard med statistik
- Filtrering & sök
==================================================
-->

<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">

<title>Avvikelsehantering</title>

<link rel="stylesheet" href="css/styles.css">

</head>


<body>

<!-- ============================================
     HEADER
============================================ -->

<header class="header">

    <div class="header-left">
        <h1>🔔 Avvikelsehantering</h1>
        <span class="header-subtitle">Demo – Måltidsservice</span>
    </div>

    <div class="header-right">

        <div class="role-switcher">
            <label for="roleSelect">Inloggad som:</label>
            <select id="roleSelect">
                <option value="Beställare">📋 Beställare (Adela Omsorg)</option>
                <option value="Restaurang">🍳 Restaurang (Köket Brahem)</option>
            </select>
        </div>

        <button id="createDeviationBtn" class="btn primary">
            + Ny avvikelse
        </button>

    </div>

</header>



<!-- ============================================
     DASHBOARD
============================================ -->

<section class="dashboard">

    <div class="stat-card">
        <span class="stat-icon">📊</span>
        <h3>Totalt</h3>
        <p id="totalCount">0</p>
    </div>

    <div class="stat-card stat-new">
        <span class="stat-icon">🆕</span>
        <h3>Nya</h3>
        <p id="newCount">0</p>
    </div>

    <div class="stat-card stat-progress">
        <span class="stat-icon">🔍</span>
        <h3>Under utredning</h3>
        <p id="progressCount">0</p>
    </div>

    <div class="stat-card stat-action">
        <span class="stat-icon">📝</span>
        <h3>Åtgärdsplan</h3>
        <p id="actionCount">0</p>
    </div>

    <div class="stat-card stat-done">
        <span class="stat-icon">✅</span>
        <h3>Åtgärdade</h3>
        <p id="resolvedCount">0</p>
    </div>

</section>



<!-- ============================================
     FILTER PANEL
============================================ -->

<section class="filter-panel">

    <input
        type="text"
        placeholder="🔎 Sök avvikelse..."
        id="searchInput"
    />

    <select id="statusFilter">
        <option value="">Alla status</option>
        <option value="Ny">Ny</option>
        <option value="Under utredning">Under utredning</option>
        <option value="Åtgärdsplan">Åtgärdsplan</option>
        <option value="Åtgärdad">Åtgärdad</option>
    </select>

    <select id="directionFilter">
        <option value="">Alla riktningar</option>
        <option value="Beställare → Restaurang">Beställare → Restaurang</option>
        <option value="Restaurang → Beställare">Restaurang → Beställare</option>
    </select>

    <select id="priorityFilter">
        <option value="">Alla prioriteter</option>
        <option value="Låg">Låg</option>
        <option value="Normal">Normal</option>
        <option value="Hög">Hög</option>
        <option value="Akut">Akut</option>
    </select>

</section>



<!-- ============================================
     DEVIATION LIST
============================================ -->

<section id="deviationList">

</section>



<!-- ============================================
     CREATE MODAL
============================================ -->

<div id="createModal" class="modal hidden">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Ny avvikelse</h2>
            <button id="closeModal" class="btn-icon">&times;</button>
        </div>

        <div class="modal-body">

            <label>Riktning</label>
            <select id="directionInput">
                <option value="Beställare → Restaurang">Beställare → Restaurang</option>
                <option value="Restaurang → Beställare">Restaurang → Beställare</option>
            </select>

            <label>Typ</label>
            <select id="typeInput">
                <option>Saknad måltid</option>
                <option>Fel temperatur</option>
                <option>Fel leverans</option>
                <option>Allergi/specialkost</option>
                <option>Felaktig beställning</option>
                <option>Sen beställning</option>
                <option>Övrigt</option>
            </select>

            <label>Prioritet</label>
            <select id="priorityInput">
                <option>Låg</option>
                <option selected>Normal</option>
                <option>Hög</option>
                <option>Akut</option>
            </select>

            <label>Datum</label>
            <input type="date" id="dateInput">

            <label>Enhet / Restaurang</label>
            <input type="text" id="unitInput" placeholder="T.ex. Adela Omsorg eller Köket Brahem">

            <label>Beskrivning</label>
            <textarea id="descriptionInput" placeholder="Beskriv avvikelsen i detalj..."></textarea>

        </div>

        <div class="modal-footer">
            <button id="saveDeviation" class="btn primary">Skapa avvikelse</button>
            <button id="cancelModal" class="btn secondary">Avbryt</button>
        </div>

    </div>

</div>



<!-- ============================================
     ACTION PLAN MODAL
============================================ -->

<div id="actionModal" class="modal hidden">

    <div class="modal-content">

        <div class="modal-header">
            <h2>📝 Åtgärdsplan</h2>
            <button id="closeActionModal" class="btn-icon">&times;</button>
        </div>

        <div class="modal-body">

            <label>Orsaksanalys</label>
            <textarea id="causeInput" placeholder="Vad var grundorsaken?"></textarea>

            <label>Åtgärd</label>
            <textarea id="actionInput" placeholder="Vilken åtgärd genomförs?"></textarea>

            <label>Ansvarig</label>
            <input type="text" id="responsibleInput" placeholder="Vem ansvarar för åtgärden?">

            <label>Klart senast</label>
            <input type="date" id="deadlineInput">

        </div>

        <div class="modal-footer">
            <button id="saveAction" class="btn primary">Spara åtgärdsplan</button>
            <button id="cancelActionModal" class="btn secondary">Avbryt</button>
        </div>

    </div>

</div>



<script src="data/demo-data.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/comments.js"></script>
<script src="js/app.js"></script>

</body>
</html>
